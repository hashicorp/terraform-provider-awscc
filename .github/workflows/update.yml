name: Update Schema
on: 
  schedule:
    - cron: '0 17 * * 1-5'
  workflow_dispatch:
jobs:
  update:
    name: Update Schema
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: us-east-1
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run make update-schema
        run: make update-schema
        
      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code || echo "changes=true" >> $GITHUB_OUTPUT
          
      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Update schema"
          title: "Automated Schema Update"
          body: |
            <!--- See what makes a good Pull Request at: https://github.com/hashicorp/terraform-provider-awscc/blob/main/contributing/CONTRIBUTING.md --->

            <!--- Please keep this note for the community --->

            ### Community Note

            * Please vote on this pull request by adding a 👍 [reaction](https://blog.github.com/2016-03-10-add-reactions-to-pull-requests-issues-and-comments/) to the original pull request comment to help the community and maintainers prioritize this request
            * Please do not leave "+1" or other comments that do not add relevant new information or questions, they generate extra noise for pull request followers and do not help prioritize the request
            * The resources and data sources in this provider are generated from the CloudFormation schema, so they can only support the actions that the underlying schema supports. For this reason submitted bugs should be limited to defects in the generation and runtime code of the provider. Customizing behavior of the resource, or noting a gap in behavior are not valid bugs and should be submitted as enhancements to AWS via the CloudFormation Open Coverage Roadmap.

            <!--- Thank you for keeping this note for the community --->

            <!--- If your PR fully resolves and should automatically close the linked issue, use Closes. Otherwise, use Relates --->
            Related #2323 

            <!-- heimdall_github_prtemplate:grc-pci_dss-2024-01-05 -->

            ## Rollback Plan

            If a change needs to be reverted, we will publish an updated version of the library.

            ## Changes to Security Controls

            Are there any changes to security controls (access controls, encryption, logging) in this pull request? If so, explain.

            ## Description

            Hold your hats and stash your mules, we've added quite a stack of tools—
            Routing rules for gateway crews, who dodge and weave through JSON queues.
            With *EVS* environments in rows, where logic grows and workload flows,
            You'll now have snapshots *Lightsail*-bright, to back your bytes by day or night.

            The firewall links from VPC towns have endpoint nouns that won't back down,
            Associations now in pairs, just like your socks or awkward stares.
            And *S3Express* (fancy dress!) now grants you pointy access-ness,
            So buckets burst with stylish flair, as access points pop everywhere!

            Whether plural, paired, or one-by-one, these data sources join the fun.
            So if you read this rhyme parade, you've found the Easter egg we laid—
            A silly string of cloud delight, where YAML dreams take off in flight!
          branch: automated-schema-update
          base: main
          delete-branch: true

      - name: Send Slack Success Notification 
        if: success()
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          method: chat.postMessage
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL }}",
              "text": ":white_check_mark: Schema update completed successfully.",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":white_check_mark: Schema update completed successfully."
                  }
                }
              ]
            }
      - name: Send Slack Failure Notification
        if: failure()
        uses: slackapi/slack-github-action@b0fa283ad8fea605de13dc3f449259339835fc52 # v2.1.0
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          SLACK_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        with:
          method: chat.postMessage
          payload: |
            {
              "channel": "${{ secrets.SLACK_CHANNEL }}",
              "text": ":x: Schema update failed.",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": ":x: Schema update failed. Please check the logs for details."
                  }
                }
              ]
            }